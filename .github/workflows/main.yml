on:
  push:
    branches:
      - "kmini3g"

  pull_request:
    branches:
      - "kmini3g"

name: Build

jobs:
  create-boot-image:
    name: Create boot image for kmini3g
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: install dependencies
        run: sudo apt install git make gcc g++ device-tree-compiler bc bison flex libssl-dev libncurses-dev python3-ply python3-git libgmp3-dev libmpc-dev gcc-arm-linux-gnueabihf
      - name: Run build script
        run: |
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-gnueabihf-
          make qcom_defconfig
          make -j$(nproc --all)
      - uses: actions/upload-artifact@v3
        with:
          name: Samsung Galaxy S5 Mini Duos
          path: ./arch/arm/boot/zImage
